# Repo: outer — Dockerfile: docker-lab/backend/Dockerfile
# https://render.com/docs/blueprint-spec

databases:
  - name: docker-lab-postgres
    plan: free
    region: oregon
    databaseName: docker_lab

services:
  - type: web
    name: docker-lab-api
    runtime: docker
    branch: main
    region: oregon
    plan: starter
    rootDir: docker-lab/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: docker-lab-postgres
          property: connectionString
    buildFilter:
      paths:
        - docker-lab/backend/**
        - render.yaml
