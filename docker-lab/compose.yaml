# Standalone: run from this directory (`docker compose up --build`).
#
# `web` shares Postgres network stack → DATABASE_URL uses 127.0.0.1 (see repo-root compose).

services:
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    network_mode: service:db
    environment:
      PORT: "8000"
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/docker_lab
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "pip install -q -r requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port $${PORT:-8000} --reload"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docker_lab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${LAB_PG_PUBLISH:-5433}:5432"
      - "8080:8000"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docker_lab"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
